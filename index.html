<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin/>
    <link rel="preload" as="style" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" media="print" onload="this.media='all'"/>
    <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"/></noscript>
    <meta name="viewport" content="width=1920, initial-scale=1.0, user-scalable=no" />
    <meta name="google" content="notranslate"/>
    <meta http-equiv="Content-Language" content="ko"/>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
    <meta http-equiv="Pragma" content="no-cache"/>
    <meta http-equiv="Expires" content="0"/>
    <title>my-commerce</title>
    <style>
      /* 모바일에서 텍스트 입력 시 iOS 자동 줌인 방지 */
      input, select, textarea {
        font-size: 16px !important;
        touch-action: manipulation;
      }
    </style>
    <script>
      /* PC 1920px 기준 디자인을 화면 너비에 비례 축소 — 모바일/태블릿 동일 비율 유지 */
      (function () {
        var DESIGN = 1920;
        var vw = window.innerWidth || screen.width;
        if (vw < DESIGN) {
          var s = vw / DESIGN;
          var meta = document.querySelector('meta[name="viewport"]');
          if (meta) {
            meta.setAttribute('content',
              'width=' + DESIGN +
              ',initial-scale=' + s.toFixed(6) +
              ',maximum-scale=' + s.toFixed(6) +
              ',user-scalable=no'
            );
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root" translate="no" class="notranslate"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
